# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  start:
    desc: Start the Lit SPA dev server
    dir: frontend
    cmds:
      - npm run dev -- --host 0.0.0.0

  codegen:
    desc: "Start Playwright codegen mod Lit SPA (åbn http://localhost:${HOST_NOVNC_PORT}/vnc.html, fallback 6080). Eks: task spa-lit:codegen -- MyTest.cs"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - ./pw-codegen.sh {{if .CLI_ARGS}}--output=backend/src/PlaywrightTests/{{.CLI_ARGS}}{{end}} http://localhost:5173
